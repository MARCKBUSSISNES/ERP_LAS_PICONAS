</head>
<body>

  <!-- App root -->

  <!-- Lib -->
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

 <!-- Core -->
<script defer src="js/recetas_seed.js"></script>
<script defer src="js/database.js"></script>

<script defer src="js/router.js"></script>

  <!-- Views / Modules -->
  <script defer src="js/dashboard.js"></script>
  <script defer src="js/clientes.js"></script>
  <script defer src="js/vehiculos.js"></script>

  <script defer src="js/recetas.js"></script>
  <script defer src="js/produccion.js"></script>
  <script defer src="js/inventario.js"></script>

  <!-- Tickets debe ir antes de envios -->
  <script defer src="js/tickets.js"></script>
  <script defer src="js/envios.js"></script>
  <script defer src="js/historial_envios.js"></script>
  <script defer src="js/export.js"></script>

  <script defer src="js/usuarios.js"></script>
  <!-- Boot -->
  <script defer>
    function $(id){ return document.getElementById(id); }

    function mbEscHtml(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function mbEscAttr(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll('"',"&quot;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function mbModalBase({title="", message="", bodyHTML="", actionsHTML="", closeOnBackdrop=true, onCancel=null}){
      const div = document.createElement("div");
      div.className = "mb-modal";

      div.innerHTML = `
        <div class="mb-backdrop"></div>
        <div class="mb-card">
          <div class="mb-head">
            <img class="mb-logo" src="assets/LOGO2.png" alt="LOGO2" onerror="this.src='assets/logo.png';this.onerror=null;">
            <div>
              <div class="mb-title">${mbEscHtml(title)}</div>
              <div class="mb-sub">Las Piconas ERP</div>
            </div>
          </div>

          <div class="mb-body">
            <div style="margin-bottom:10px;white-space:pre-line;">${String(message || "")}</div>
            ${bodyHTML || ""}
            <div class="mb-actions">${actionsHTML || ""}</div>
          </div>
        </div>
      `;

      document.body.appendChild(div);

      const close = () => {
        div.classList.add("mb-close");
        setTimeout(()=>div.remove(), 170);
      };

      const cancel = () => {
        close();
        if(typeof onCancel === "function") onCancel();
      };

      const backdrop = div.querySelector(".mb-backdrop");
      if(backdrop && closeOnBackdrop){
        backdrop.addEventListener("click", cancel);
      }

      div.addEventListener("keydown", (e) => {
        if(e.key === "Escape") cancel();
      });

      return { el: div, close, cancel };
    }

    function mbAlert(msg, title="Aviso"){
      return new Promise(resolve=>{
        const m = mbModalBase({
          title,
          message: mbEscHtml(String(msg ?? "")),
          actionsHTML: `<button class="btn accent" id="mbOkBtn">Aceptar</button>`,
          onCancel: () => resolve(true)
        });

        const ok = m.el.querySelector("#mbOkBtn");
        ok?.focus?.();
        ok?.addEventListener("click", () => {
          m.close();
          resolve(true);
        });
      });
    }

    function mbConfirm(msg, title="Confirmación"){
      return new Promise(resolve=>{
        const m = mbModalBase({
          title,
          message: mbEscHtml(String(msg ?? "")),
          actionsHTML: `
            <button class="btn" id="mbCancelBtn">Cancelar</button>
            <button class="btn danger" id="mbOkBtn">Confirmar</button>
          `,
          onCancel: () => resolve(false)
        });

        m.el.querySelector("#mbCancelBtn")?.addEventListener("click", () => {
          m.close();
          resolve(false);
        });

        const ok = m.el.querySelector("#mbOkBtn");
        ok?.focus?.();
        ok?.addEventListener("click", () => {
          m.close();
          resolve(true);
        });
      });
    }

    function mbPrompt(msg, def="", title="Ingresar dato"){
      return new Promise(resolve=>{
        const m = mbModalBase({
          title,
          message: mbEscHtml(String(msg ?? "")),
          bodyHTML: `<input id="mbPromptInput" value="${mbEscAttr(def)}" autocomplete="off">`,
          actionsHTML: `
            <button class="btn" id="mbCancelBtn">Cancelar</button>
            <button class="btn accent" id="mbOkBtn">Guardar</button>
          `,
          onCancel: () => resolve(null)
        });

        const input = m.el.querySelector("#mbPromptInput");
        setTimeout(()=>{
          input?.focus?.();
          input?.select?.();
        }, 10);

        input?.addEventListener("keydown", (e) => {
          if(e.key === "Enter"){
            e.preventDefault();
            const val = input.value;
            m.close();
            resolve(val);
          }
        });

        m.el.querySelector("#mbCancelBtn")?.addEventListener("click", () => {
          m.close();
          resolve(null);
        });

        m.el.querySelector("#mbOkBtn")?.addEventListener("click", () => {
          const val = input ? input.value : "";
          m.close();
          resolve(val);
        });
      });
    }

    // Reemplazo visual de alert nativo
    window.alert = function(msg){
      mbAlert(String(msg ?? ""));
    };

    document.addEventListener("DOMContentLoaded", () => {
      initDatabase();
      boot();
    });

    function boot(){
      const app = $("app");
      if(!getSession()){
        app.innerHTML = renderLogin();
        return;
      }
      app.innerHTML = renderShell();
      loadView("dashboard");
      paintUser();
    }

    function renderLogin(){
      return `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
          <div class="panel" style="max-width:420px;width:100%;text-align:center;">
            <img src="assets/logo.png" alt="Las Piconas" style="width:120px;max-width:100%;margin-bottom:12px;" onerror="this.style.display='none'">
            <div class="big">Login</div>
            <div class="muted" style="margin-top:6px;">MarckBusiness • Enterprise Resource Planning</div>

            <div style="margin-top:14px;text-align:left;">
              <label>Usuario</label>
              <input id="user" autocomplete="username" placeholder="juan luis" />
              <label>Clave</label>
              <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />
              <button class="btn accent" style="width:100%;" onclick="doLogin()">Ingresar</button>
            </div>
          </div>
        </div>
      `;
    }

    function doLogin(){
      const u = $("user").value;
      const p = $("pass").value;
      if(login(u,p)){
        location.reload();
      }else{
        alert("Credenciales incorrectas");
      }
    }

    function renderShell(){
      return `
        <div class="sidebar">
          <div style="text-align:center;margin-bottom:14px;">
            <img src="assets/logo.png" alt="Las Piconas" style="width:110px;max-width:100%;display:block;margin:0 auto 10px;" onerror="this.style.display='none'">
            <div style="font-weight:800;letter-spacing:.6px;">Las Piconas</div>
            <div class="muted small">ERP • Planta de Produccion</div>
          </div>

<button data-view="dashboard" onclick="loadView('dashboard')">Dashboard</button>
<hr>

<button data-view="clientes" onclick="loadView('clientes')">Sucursales</button>
<button data-view="vehiculos" onclick="loadView('vehiculos')">Vehículos</button>

${can("usuarios") ? `
  <hr>
  <button data-view="usuarios" onclick="loadView('usuarios')">Usuarios & Roles</button>
` : ``}

<hr>

<button data-view="recetas" onclick="loadView('recetas')">Recetas</button>
<button data-view="produccion" onclick="loadView('produccion')">Producción</button>
<button data-view="inventarioPT" onclick="loadView('inventarioPT')">Inventario PT</button>
<button data-view="mp" onclick="loadView('mp')">Inventario MP</button>
<button data-view="comprasMP" onclick="loadView('comprasMP')">Compras MP</button>
<button data-view="historialEnvios" onclick="loadView('historialEnvios')">Historial Envíos</button>

<hr>

<button data-view="envios" onclick="loadView('envios')">Envíos</button>

<hr>

${isAdmin() ? `
  <div class="muted small" style="margin:6px 0 8px;">Backups (Admin)</div>
  <button onclick="uiChooseBackupFolder()">📁 Elegir carpeta backup</button>
  <button onclick="uiRestoreBackup()">⬆️ Cargar backup</button>
` : ``}

<button onclick="logoutAndReload()">Cerrar Sesión</button>
        </div>

        <div class="main">
          <div class="panel" style="padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
            <div>
              <div class="big" style="font-size:18px;">MarckBusiness • Enterprise Resource Planning</div>
              <div class="muted small">© 2026 Marck Business. Todos los derechos reservados.</div>
            </div>
            <div style="text-align:right;">
              <div class="small muted">Sesión</div>
              <div id="top-user" style="font-weight:800;">—</div>
            </div>
          </div>

          <div id="view-container"></div>
        </div>
      `;
    }

    function paintUser(){
      const s = getSession();
      const el = $("top-user");
      if(!el) return;

      if(!s || !s.usuario){
        el.textContent = "—";
        return;
      }

      const db = getDB();
      const usuarios = db?.usuarios || [];
      const actual = usuarios.find(u =>
        String(u.usuario || "").trim().toLowerCase() === String(s.usuario || "").trim().toLowerCase()
      );

      const avatar = actual?.avatar || "";
      const nombre = s.usuario || "Usuario";
      const rol = s.rol || actual?.rol || "";

      el.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;">
          ${
            avatar
              ? `<img src="${avatar}" alt="avatar" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);">`
              : `<div style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);display:inline-block;"></div>`
          }
          <div style="display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;min-width:0;">
            <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">
              ${mbEscHtml(nombre)}
            </div>
            <div class="small muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">
              ${mbEscHtml(rol)}
            </div>
          </div>
        </div>
      `;
    }



// ===== Backups (File System Access) - UI =====
function uiChooseBackupFolder(){
  if(!isAdmin()){ alert("Solo ADMIN puede seleccionar carpeta de backup."); return; }
  chooseBackupFolderFS().catch(e=>{ console.error(e); alert("No se pudo seleccionar carpeta: " + (e?.message||e)); });
}
function uiRestoreBackup(){
  if(!isAdmin()){ alert("Solo ADMIN puede cargar/restaurar un backup."); return; }
  const inp = document.getElementById("backupFileInput");
  if(!inp){ alert("Input de backup no existe."); return; }
  inp.value = "";
  inp.click();
}
async function onBackupFileSelected(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  if(!isAdmin()){ alert("Solo ADMIN puede cargar/restaurar un backup."); return; }
  try{
    await importBackupDB(file);
    toast?.("✅ Backup cargado. Recargando...");
    setTimeout(()=>location.reload(), 300);
  }catch(e){
    console.error(e);
    alert("Backup inválido: " + (e?.message||e));
  }
}

function logoutAndReload(){
      logout();
      location.reload();
    }
  </script>
  <input id="backupFileInput" type="file" accept="application/json,.json" style="display:none" onchange="onBackupFileSelected(event)">
</body>
